<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Sinaw Pharma Book — First-time Setup</title>
<meta name="sinaw-api" content="https://sinaw-pharma-api.sinaw20003.workers.dev">
<style>
  body{font-family:system-ui,sans-serif;background:#f4ead7;color:#352719;margin:0;min-height:100vh;display:grid;place-items:center;padding:24px}
  .card{background:#fffaf0;border:1px solid #e4d7bd;border-radius:18px;max-width:440px;width:100%;padding:28px;box-shadow:0 20px 50px -24px rgba(53,39,25,.5)}
  h1{font-size:22px;margin:0 0 6px} p{color:#6d5c47;font-size:14px;line-height:1.5;margin:0 0 18px}
  label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#9c8b72;margin:14px 0 6px}
  input{width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid #d6c4a3;border-radius:10px;font-size:15px;background:#f4ead7}
  input:focus{outline:none;border-color:#188b86;box-shadow:0 0 0 3px #dff0ef}
  button{margin-top:20px;width:100%;background:#188b86;color:#fff;border:0;border-radius:11px;padding:14px;font-size:14px;font-weight:600;cursor:pointer}
  button:hover{background:#0f706c} button:disabled{opacity:.5}
  .msg{margin-top:14px;font-size:13px;min-height:18px}
  .ok{color:#0f706c} .err{color:#b4452f}
  .note{margin-top:18px;font-size:12px;color:#9c8b72;line-height:1.5}
</style>
</head>
<body>
  <div class="card">
    <h1>First-time setup</h1>
    <p>Use this page <strong>once</strong> to create the admin password. After it succeeds you can delete this file — it stops working on its own anyway.</p>
    <label for="tok">Setup token</label>
    <input id="tok" type="password" placeholder="the SETUP_TOKEN you set in Cloudflare" autocomplete="off">
    <label for="pw">New admin password (min 10 characters)</label>
    <input id="pw" type="password" placeholder="choose a strong password" autocomplete="new-password">
    <label for="pw2">Confirm password</label>
    <input id="pw2" type="password" placeholder="repeat it" autocomplete="new-password">
    <button id="go">Create admin password</button>
    <div class="msg" id="msg"></div>
    <div class="note">This sends your password directly to your own Cloudflare Worker over HTTPS. The Worker stores only a salted PBKDF2 hash — never the password itself.</div>
  </div>
  <script src="/setup.js"></script>
</body>
</html>
